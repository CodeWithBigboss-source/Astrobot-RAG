version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: astrobot_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: astrobot123
      MYSQL_DATABASE: astrobot_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    container_name: astrobot_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: astrobot_db
      DB_USER: root
      DB_PASSWORD: astrobot123
      HF_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      CHROMA_PERSIST_DIR: /app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: astrobot_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  chroma_data:
